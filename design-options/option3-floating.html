<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 3: Floating Badges</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Jost', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1E3450 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .showcase {
      width: 100%;
      max-width: 900px;
      position: relative;
    }

    .glasses-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1.3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glasses-svg {
      width: 70%;
      filter: drop-shadow(0 20px 60px rgba(74, 155, 184, 0.3));
    }

    /* Floating Badge Style */
    .floating-badge {
      position: absolute;
      background: linear-gradient(135deg, rgba(22, 40, 64, 0.95), rgba(30, 52, 80, 0.9));
      border: 2px solid rgba(74, 155, 184, 0.3);
      border-radius: 50px;
      padding: 0.8rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      animation: floatIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      box-shadow: 
        0 8px 24px rgba(0, 0, 0, 0.3),
        0 0 0 0 rgba(74, 155, 184, 0.4);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .floating-badge::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50px;
      background: linear-gradient(135deg, rgba(74, 155, 184, 0.4), transparent);
      opacity: 0;
      transition: opacity 0.4s;
      z-index: -1;
    }

    .floating-badge:hover {
      transform: translateY(-8px) scale(1.05);
      border-color: rgba(74, 155, 184, 0.6);
      box-shadow: 
        0 16px 40px rgba(0, 0, 0, 0.4),
        0 0 0 8px rgba(74, 155, 184, 0.1);
    }

    .floating-badge:hover::before {
      opacity: 1;
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      60% {
        transform: translateY(-5px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .badge-icon-wrapper {
      position: relative;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .badge-icon {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(74, 155, 184, 0.3), rgba(74, 155, 184, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      position: relative;
      z-index: 1;
    }

    .badge-glow {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(74, 155, 184, 0.4), transparent 70%);
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% {
        transform: scale(1);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.2);
        opacity: 0.8;
      }
    }

    .badge-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #E8E2D8;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    /* Connection Lines */
    .connection-line {
      position: absolute;
      width: 2px;
      background: linear-gradient(180deg, rgba(74, 155, 184, 0.4), rgba(74, 155, 184, 0.1));
      transform-origin: top;
      opacity: 0;
      animation: lineGrow 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes lineGrow {
      to {
        opacity: 1;
      }
    }

    .line-camera {
      top: 18%;
      left: 26%;
      height: 120px;
      transform: rotate(-45deg);
      animation-delay: 0.4s;
    }

    .line-audio {
      top: 35%;
      right: 22%;
      height: 80px;
      transform: rotate(30deg);
      animation-delay: 0.6s;
    }

    .line-sensors {
      bottom: 25%;
      left: 50%;
      height: 100px;
      animation-delay: 0.8s;
    }

    /* Positioning with floating animation */
    .badge-camera {
      top: 5%;
      left: 8%;
      animation-delay: 0.2s;
      animation-name: floatIn, continuousFloat;
      animation-duration: 1s, 3s;
      animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1), ease-in-out;
      animation-iteration-count: 1, infinite;
      animation-delay: 0.2s, 1.2s;
    }

    .badge-audio {
      top: 42%;
      right: 5%;
      animation-delay: 0.4s;
      animation-name: floatIn, continuousFloat;
      animation-duration: 1s, 3.5s;
      animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1), ease-in-out;
      animation-iteration-count: 1, infinite;
      animation-delay: 0.4s, 1.4s;
    }

    .badge-sensors {
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: 0.6s;
      animation-name: floatInCenter, continuousFloat;
      animation-duration: 1s, 4s;
      animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1), ease-in-out;
      animation-iteration-count: 1, infinite;
      animation-delay: 0.6s, 1.6s;
    }

    @keyframes floatInCenter {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(30px) scale(0.95);
      }
      60% {
        transform: translateX(-50%) translateY(-5px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }

    @keyframes continuousFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .title {
      text-align: center;
      margin-bottom: 3rem;
      color: #E8E2D8;
    }

    .title h1 {
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .title p {
      font-size: 0.9rem;
      color: rgba(232, 226, 216, 0.6);
    }
  </style>
</head>
<body>
  <div class="showcase">
    <div class="title">
      <h1>Option 3: Floating Badges</h1>
      <p>Animated badges with continuous floating motion</p>
    </div>
    
    <div class="glasses-container">
      <!-- Glasses SVG -->
      <svg class="glasses-svg" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
        <rect x="80" y="90" width="150" height="100" rx="10" fill="none" stroke="#4A9BB8" stroke-width="6" opacity="0.95"/>
        <rect x="86" y="96" width="138" height="88" rx="8" fill="rgba(74,155,184,0.1)" opacity="0.5"/>
        <rect x="370" y="90" width="150" height="100" rx="10" fill="none" stroke="#4A9BB8" stroke-width="6" opacity="0.95"/>
        <rect x="376" y="96" width="138" height="88" rx="8" fill="rgba(74,155,184,0.1)" opacity="0.5"/>
        <path d="M 230 130 Q 260 125 290 125 L 310 125 Q 340 125 370 130" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
        <path d="M 80 130 L 40 130 Q 25 130 20 135" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
        <path d="M 520 130 L 560 130 Q 575 130 580 135" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
      </svg>

      <!-- Connection Lines -->
      <div class="connection-line line-camera"></div>
      <div class="connection-line line-audio"></div>
      <div class="connection-line line-sensors"></div>

      <!-- Floating Badges -->
      <div class="floating-badge badge-camera">
        <div class="badge-icon-wrapper">
          <div class="badge-glow"></div>
          <div class="badge-icon">📷</div>
        </div>
        <div class="badge-label">ToF Cameras</div>
      </div>

      <div class="floating-badge badge-audio">
        <div class="badge-icon-wrapper">
          <div class="badge-glow"></div>
          <div class="badge-icon">🎧</div>
        </div>
        <div class="badge-label">Bone Conduction</div>
      </div>

      <div class="floating-badge badge-sensors">
        <div class="badge-icon-wrapper">
          <div class="badge-glow"></div>
          <div class="badge-icon">📡</div>
        </div>
        <div class="badge-label">GPS + IMU</div>
      </div>
    </div>
  </div>
</body>
</html>
