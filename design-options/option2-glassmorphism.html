<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 2: Glassmorphism</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Jost', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1E3450 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 80%;
      height: 150%;
      background: radial-gradient(circle, rgba(74, 155, 184, 0.15) 0%, transparent 70%);
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-30px, 30px); }
    }

    .showcase {
      width: 100%;
      max-width: 900px;
      position: relative;
      z-index: 1;
    }

    .glasses-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1.3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glasses-svg {
      width: 70%;
      filter: drop-shadow(0 20px 60px rgba(74, 155, 184, 0.3));
    }

    /* Glassmorphism Style */
    .glass-badge {
      position: absolute;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .glass-badge::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .glass-badge:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-6px) scale(1.03);
      box-shadow: 
        0 16px 48px rgba(74, 155, 184, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(74, 155, 184, 0.25), rgba(74, 155, 184, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(74, 155, 184, 0.15);
      position: relative;
    }

    .glass-icon::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.15), transparent);
      border-radius: 12px 12px 0 0;
    }

    .glass-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .glass-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #E8E2D8;
      letter-spacing: -0.01em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .glass-subtitle {
      font-size: 0.7rem;
      color: rgba(232, 226, 216, 0.7);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4A9BB8;
      position: absolute;
      top: -4px;
      right: -4px;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(74, 155, 184, 0.7);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(74, 155, 184, 0.7);
      }
      50% {
        transform: scale(1.1);
        box-shadow: 0 0 0 8px rgba(74, 155, 184, 0);
      }
    }

    /* Positioning */
    .badge-camera {
      top: 8%;
      left: 10%;
      animation-delay: 0.2s;
    }

    .badge-audio {
      top: 48%;
      right: 8%;
      animation-delay: 0.4s;
    }

    .badge-sensors {
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      animation-delay: 0.6s;
    }

    .badge-sensors.glass-badge {
      animation: slideUpCenter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.6s;
    }

    @keyframes slideUpCenter {
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .title {
      text-align: center;
      margin-bottom: 3rem;
      color: #E8E2D8;
    }

    .title h1 {
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .title p {
      font-size: 0.9rem;
      color: rgba(232, 226, 216, 0.6);
    }
  </style>
</head>
<body>
  <div class="showcase">
    <div class="title">
      <h1>Option 2: Glassmorphism</h1>
      <p>Frosted glass effect with elegant transparency</p>
    </div>
    
    <div class="glasses-container">
      <!-- Glasses SVG -->
      <svg class="glasses-svg" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
        <rect x="80" y="90" width="150" height="100" rx="10" fill="none" stroke="#4A9BB8" stroke-width="6" opacity="0.95"/>
        <rect x="86" y="96" width="138" height="88" rx="8" fill="rgba(74,155,184,0.1)" opacity="0.5"/>
        <rect x="370" y="90" width="150" height="100" rx="10" fill="none" stroke="#4A9BB8" stroke-width="6" opacity="0.95"/>
        <rect x="376" y="96" width="138" height="88" rx="8" fill="rgba(74,155,184,0.1)" opacity="0.5"/>
        <path d="M 230 130 Q 260 125 290 125 L 310 125 Q 340 125 370 130" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
        <path d="M 80 130 L 40 130 Q 25 130 20 135" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
        <path d="M 520 130 L 560 130 Q 575 130 580 135" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
      </svg>

      <!-- Glass Badges -->
      <div class="glass-badge badge-camera">
        <div class="glass-icon">
          <div class="pulse-dot"></div>
          📷
        </div>
        <div class="glass-text">
          <div class="glass-title">ToF Cameras</div>
          <div class="glass-subtitle">Depth Sensing</div>
        </div>
      </div>

      <div class="glass-badge badge-audio">
        <div class="glass-icon">
          <div class="pulse-dot"></div>
          🎧
        </div>
        <div class="glass-text">
          <div class="glass-title">Bone Conduction</div>
          <div class="glass-subtitle">Private Audio</div>
        </div>
      </div>

      <div class="glass-badge badge-sensors">
        <div class="glass-icon">
          <div class="pulse-dot"></div>
          📡
        </div>
        <div class="glass-text">
          <div class="glass-title">GPS + IMU</div>
          <div class="glass-subtitle">Precision Tracking</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
