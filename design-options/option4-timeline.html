<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 4: Connected Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Jost', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1E3450 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .showcase {
      width: 100%;
      max-width: 900px;
      position: relative;
    }

    .glasses-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1.3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glasses-svg {
      width: 70%;
      filter: drop-shadow(0 20px 60px rgba(74, 155, 184, 0.3));
    }

    /* Connected Timeline Style */
    .timeline-badge {
      position: absolute;
      background: rgba(22, 40, 64, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(74, 155, 184, 0.25);
      border-radius: 20px;
      padding: 1.1rem 1.6rem 1.1rem 1.3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      overflow: visible;
    }

    .timeline-badge::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 60%;
      background: linear-gradient(180deg, var(--accent-color), transparent);
      border-radius: 2px;
    }

    .timeline-badge:hover {
      background: rgba(22, 40, 64, 0.95);
      border-color: rgba(74, 155, 184, 0.5);
      transform: translateX(-4px);
      box-shadow: 
        0 12px 36px rgba(0, 0, 0, 0.3),
        -4px 0 16px rgba(74, 155, 184, 0.2);
    }

    .badge-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent-color);
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 0 0 0 var(--accent-color);
      animation: ripple 2s ease-in-out infinite;
    }

    @keyframes ripple {
      0%, 100% {
        box-shadow: 0 0 0 0 var(--accent-color);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(74, 155, 184, 0);
      }
    }

    .badge-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .badge-emoji {
      font-size: 1.1rem;
      margin-right: 0.3rem;
    }

    .badge-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #E8E2D8;
      letter-spacing: -0.01em;
    }

    .badge-desc {
      font-size: 0.7rem;
      color: rgba(232, 226, 216, 0.5);
      font-weight: 400;
    }

    /* SVG Connection Lines */
    .connections {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .connection-path {
      stroke: rgba(74, 155, 184, 0.3);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 6 6;
      opacity: 0;
      animation: pathDraw 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes pathDraw {
      to {
        opacity: 1;
        stroke-dashoffset: -100;
      }
    }

    .connection-path.animated {
      animation: pathDraw 1s cubic-bezier(0.16, 1, 0.3, 1) forwards, 
                 flowingDash 20s linear infinite;
    }

    @keyframes flowingDash {
      to {
        stroke-dashoffset: -1000;
      }
    }

    /* Positioning and Colors */
    .badge-camera {
      --accent-color: #4A9BB8;
      top: 8%;
      left: 10%;
      animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s;
    }

    .badge-audio {
      --accent-color: #7BBDD0;
      top: 45%;
      right: 8%;
      animation: fadeInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s;
    }

    .badge-sensors {
      --accent-color: #C9A96E;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      animation: fadeInBottom 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.7s;
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeInBottom {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .path-camera {
      animation-delay: 0.5s;
    }

    .path-audio {
      animation-delay: 0.7s;
    }

    .path-sensors {
      animation-delay: 0.9s;
    }

    .title {
      text-align: center;
      margin-bottom: 3rem;
      color: #E8E2D8;
    }

    .title h1 {
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .title p {
      font-size: 0.9rem;
      color: rgba(232, 226, 216, 0.6);
    }
  </style>
</head>
<body>
  <div class="showcase">
    <div class="title">
      <h1>Option 4: Connected Timeline</h1>
      <p>Features connected with flowing animated paths</p>
    </div>
    
    <div class="glasses-container">
      <!-- SVG Connection Lines -->
      <svg class="connections" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
        <!-- Line from camera badge to glasses -->
        <path class="connection-path path-camera animated" 
              d="M 150 80 Q 200 120 280 180" />
        
        <!-- Line from audio badge to glasses -->
        <path class="connection-path path-audio animated" 
              d="M 750 280 Q 680 260 550 240" />
        
        <!-- Line from sensors badge to glasses -->
        <path class="connection-path path-sensors animated" 
              d="M 450 480 L 450 350" />
      </svg>

      <!-- Glasses SVG -->
      <svg class="glasses-svg" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
        <rect x="80" y="90" width="150" height="100" rx="10" fill="none" stroke="#4A9BB8" stroke-width="6" opacity="0.95"/>
        <rect x="86" y="96" width="138" height="88" rx="8" fill="rgba(74,155,184,0.1)" opacity="0.5"/>
        <rect x="370" y="90" width="150" height="100" rx="10" fill="none" stroke="#4A9BB8" stroke-width="6" opacity="0.95"/>
        <rect x="376" y="96" width="138" height="88" rx="8" fill="rgba(74,155,184,0.1)" opacity="0.5"/>
        <path d="M 230 130 Q 260 125 290 125 L 310 125 Q 340 125 370 130" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
        <path d="M 80 130 L 40 130 Q 25 130 20 135" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
        <path d="M 520 130 L 560 130 Q 575 130 580 135" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
      </svg>

      <!-- Timeline Badges -->
      <div class="timeline-badge badge-camera">
        <div class="badge-dot"></div>
        <div class="badge-info">
          <div class="badge-name">
            <span class="badge-emoji">📷</span>
            ToF Cameras
          </div>
          <div class="badge-desc">30fps depth sensing • 5m range</div>
        </div>
      </div>

      <div class="timeline-badge badge-audio">
        <div class="badge-dot"></div>
        <div class="badge-info">
          <div class="badge-name">
            <span class="badge-emoji">🎧</span>
            Bone Conduction
          </div>
          <div class="badge-desc">Crystal-clear audio • Open ear design</div>
        </div>
      </div>

      <div class="timeline-badge badge-sensors">
        <div class="badge-dot"></div>
        <div class="badge-info">
          <div class="badge-name">
            <span class="badge-emoji">📡</span>
            GPS + IMU
          </div>
          <div class="badge-desc">1m accuracy • Fall detection enabled</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
