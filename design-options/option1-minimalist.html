<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 1: Minimalist Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Jost', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1E3450 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .showcase {
      width: 100%;
      max-width: 900px;
      position: relative;
    }

    .glasses-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1.3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glasses-svg {
      width: 70%;
      filter: drop-shadow(0 20px 60px rgba(74, 155, 184, 0.3));
    }

    /* Minimalist Card Style */
    .feature-card {
      position: absolute;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 1.25rem 1.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      transform: scale(0.9);
      animation: fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .feature-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(74, 155, 184, 0.4);
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 12px 40px rgba(74, 155, 184, 0.2);
    }

    @keyframes fadeInScale {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(74, 155, 184, 0.2), rgba(74, 155, 184, 0.05));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      position: relative;
    }

    .feature-icon::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 13px;
      background: linear-gradient(135deg, rgba(74, 155, 184, 0.3), transparent);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .feature-card:hover .feature-icon::after {
      opacity: 1;
    }

    .feature-content {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .feature-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #E8E2D8;
      letter-spacing: -0.01em;
    }

    .feature-subtitle {
      font-size: 0.75rem;
      color: rgba(232, 226, 216, 0.6);
      font-weight: 300;
    }

    /* Positioning */
    .card-camera {
      top: 5%;
      left: 8%;
      animation-delay: 0.2s;
    }

    .card-audio {
      top: 45%;
      right: 5%;
      animation-delay: 0.4s;
    }

    .card-sensors {
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      animation-delay: 0.6s;
    }

    .card-sensors.feature-card {
      animation: fadeInScaleCenter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.6s;
    }

    @keyframes fadeInScaleCenter {
      to {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    .title {
      text-align: center;
      margin-bottom: 3rem;
      color: #E8E2D8;
    }

    .title h1 {
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .title p {
      font-size: 0.9rem;
      color: rgba(232, 226, 216, 0.6);
    }
  </style>
</head>
<body>
  <div class="showcase">
    <div class="title">
      <h1>Option 1: Minimalist Cards</h1>
      <p>Clean, modern cards with subtle hover effects</p>
    </div>
    
    <div class="glasses-container">
      <!-- Glasses SVG -->
      <svg class="glasses-svg" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
        <rect x="80" y="90" width="150" height="100" rx="10" fill="none" stroke="#4A9BB8" stroke-width="6" opacity="0.95"/>
        <rect x="86" y="96" width="138" height="88" rx="8" fill="rgba(74,155,184,0.1)" opacity="0.5"/>
        <rect x="370" y="90" width="150" height="100" rx="10" fill="none" stroke="#4A9BB8" stroke-width="6" opacity="0.95"/>
        <rect x="376" y="96" width="138" height="88" rx="8" fill="rgba(74,155,184,0.1)" opacity="0.5"/>
        <path d="M 230 130 Q 260 125 290 125 L 310 125 Q 340 125 370 130" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
        <path d="M 80 130 L 40 130 Q 25 130 20 135" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
        <path d="M 520 130 L 560 130 Q 575 130 580 135" stroke="#4A9BB8" stroke-width="5" fill="none" opacity="0.95"/>
      </svg>

      <!-- Feature Cards -->
      <div class="feature-card card-camera">
        <div class="feature-icon">📷</div>
        <div class="feature-content">
          <div class="feature-title">ToF Cameras</div>
          <div class="feature-subtitle">Depth sensing</div>
        </div>
      </div>

      <div class="feature-card card-audio">
        <div class="feature-icon">🎧</div>
        <div class="feature-content">
          <div class="feature-title">Bone Conduction</div>
          <div class="feature-subtitle">Private audio</div>
        </div>
      </div>

      <div class="feature-card card-sensors">
        <div class="feature-icon">📡</div>
        <div class="feature-content">
          <div class="feature-title">GPS + IMU</div>
          <div class="feature-subtitle">Location tracking</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
