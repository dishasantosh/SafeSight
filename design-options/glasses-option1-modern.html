<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glasses Option 1: Modern Tech</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Jost', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1E3450 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .showcase {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    .title {
      color: #E8E2D8;
      margin-bottom: 3rem;
    }

    .title h1 {
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .title p {
      font-size: 0.9rem;
      color: rgba(232, 226, 216, 0.6);
    }

    .glasses-container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      filter: drop-shadow(0 20px 60px rgba(74, 155, 184, 0.3));
    }

    .component-pulse {
      animation: componentPulse 2s ease-in-out infinite;
    }

    @keyframes componentPulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.6;
      }
    }

    .led-blink {
      animation: ledBlink 1.5s ease-in-out infinite;
    }

    @keyframes ledBlink {
      0%, 100% {
        opacity: 0.3;
      }
      50% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="showcase">
    <div class="title">
      <h1>Glasses Option 1: Modern Tech</h1>
      <p>Sleek design with visible tech components</p>
    </div>
    
    <div class="glasses-container">
      <svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Gradients -->
          <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4A9BB8;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#2C5F7C;stop-opacity:1"/>
          </linearGradient>
          
          <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4A9BB8;stop-opacity:0.15"/>
            <stop offset="50%" style="stop-color:#2C5F7C;stop-opacity:0.08"/>
            <stop offset="100%" style="stop-color:#4A9BB8;stop-opacity:0.15"/>
          </linearGradient>

          <radialGradient id="cameraGlow">
            <stop offset="0%" style="stop-color:#4A9BB8;stop-opacity:0.6"/>
            <stop offset="100%" style="stop-color:#4A9BB8;stop-opacity:0"/>
          </radialGradient>

          <radialGradient id="speakerGrad">
            <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#A88850;stop-opacity:1"/>
          </radialGradient>
        </defs>

        <!-- LEFT LENS -->
        <g id="left-lens">
          <!-- Frame -->
          <rect x="100" y="140" width="200" height="120" rx="12" 
                fill="none" stroke="url(#frameGrad)" stroke-width="7" opacity="0.95"/>
          <!-- Lens -->
          <rect x="107" y="147" width="186" height="106" rx="10" 
                fill="url(#lensGrad)" opacity="0.6"/>
          <!-- Reflection highlight -->
          <ellipse cx="150" cy="170" rx="40" ry="25" fill="white" opacity="0.08"/>
          
          <!-- LEFT CAMERA MODULE -->
          <g id="left-camera">
            <!-- Camera housing -->
            <rect x="140" y="115" width="35" height="20" rx="4" 
                  fill="#2C5F7C" stroke="#4A9BB8" stroke-width="1.5"/>
            <!-- Camera lens outer ring -->
            <circle cx="157.5" cy="125" r="8" fill="#1E2D3D" stroke="#4A9BB8" stroke-width="1"/>
            <!-- Camera lens -->
            <circle cx="157.5" cy="125" r="5" fill="#0A0F14"/>
            <!-- Lens center -->
            <circle cx="157.5" cy="125" r="3" fill="url(#cameraGlow)" class="component-pulse"/>
            <!-- LED indicator -->
            <circle cx="170" cy="120" r="2" fill="#4A9BB8" class="led-blink"/>
            <!-- Sensor label -->
            <text x="157.5" y="110" font-size="8" fill="#4A9BB8" text-anchor="middle" opacity="0.7">ToF</text>
          </g>
        </g>

        <!-- RIGHT LENS -->
        <g id="right-lens">
          <!-- Frame -->
          <rect x="500" y="140" width="200" height="120" rx="12" 
                fill="none" stroke="url(#frameGrad)" stroke-width="7" opacity="0.95"/>
          <!-- Lens -->
          <rect x="507" y="147" width="186" height="106" rx="10" 
                fill="url(#lensGrad)" opacity="0.6"/>
          <!-- Reflection highlight -->
          <ellipse cx="650" cy="170" rx="40" ry="25" fill="white" opacity="0.08"/>
          
          <!-- RIGHT CAMERA MODULE -->
          <g id="right-camera">
            <!-- Camera housing -->
            <rect x="625" y="115" width="35" height="20" rx="4" 
                  fill="#2C5F7C" stroke="#4A9BB8" stroke-width="1.5"/>
            <!-- Camera lens outer ring -->
            <circle cx="642.5" cy="125" r="8" fill="#1E2D3D" stroke="#4A9BB8" stroke-width="1"/>
            <!-- Camera lens -->
            <circle cx="642.5" cy="125" r="5" fill="#0A0F14"/>
            <!-- Lens center -->
            <circle cx="642.5" cy="125" r="3" fill="url(#cameraGlow)" class="component-pulse"/>
            <!-- LED indicator -->
            <circle cx="655" cy="120" r="2" fill="#4A9BB8" class="led-blink"/>
            <!-- Sensor label -->
            <text x="642.5" y="110" font-size="8" fill="#4A9BB8" text-anchor="middle" opacity="0.7">ToF</text>
          </g>
        </g>

        <!-- BRIDGE -->
        <g id="bridge">
          <!-- Bridge connector -->
          <path d="M 300 190 Q 350 185 400 185 Q 450 185 500 190" 
                stroke="url(#frameGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
          <!-- Nose pads -->
          <ellipse cx="330" cy="205" rx="10" ry="18" fill="#4A9BB8" opacity="0.4"/>
          <ellipse cx="470" cy="205" rx="10" ry="18" fill="#4A9BB8" opacity="0.4"/>
          
          <!-- GPS/IMU Sensor Module -->
          <g id="gps-sensor">
            <rect x="385" y="175" width="30" height="15" rx="3" 
                  fill="#2C5F7C" stroke="#C9A96E" stroke-width="1.5"/>
            <circle cx="400" cy="182.5" r="4" fill="#C9A96E" opacity="0.6" class="component-pulse"/>
            <text x="400" y="172" font-size="7" fill="#C9A96E" text-anchor="middle" opacity="0.7">GPS+IMU</text>
          </g>
        </g>

        <!-- LEFT TEMPLE -->
        <g id="left-temple">
          <!-- Temple arm -->
          <path d="M 100 190 L 50 190 Q 30 190 20 195 L 15 210" 
                stroke="url(#frameGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
          <!-- Hinge -->
          <circle cx="100" cy="190" r="6" fill="#2C5F7C" stroke="#4A9BB8" stroke-width="1.5"/>
          
          <!-- BONE CONDUCTION SPEAKER - LEFT -->
          <g id="left-speaker">
            <!-- Speaker housing -->
            <rect x="10" y="200" width="18" height="30" rx="9" 
                  fill="url(#speakerGrad)" stroke="#C9A96E" stroke-width="1.5"/>
            <!-- Speaker grille lines -->
            <line x1="14" y1="208" x2="24" y2="208" stroke="#A88850" stroke-width="1" opacity="0.7"/>
            <line x1="14" y1="213" x2="24" y2="213" stroke="#A88850" stroke-width="1" opacity="0.7"/>
            <line x1="14" y1="218" x2="24" y2="218" stroke="#A88850" stroke-width="1" opacity="0.7"/>
            <line x1="14" y1="223" x2="24" y2="223" stroke="#A88850" stroke-width="1" opacity="0.7"/>
            <!-- Vibration indicator -->
            <circle cx="19" cy="215" r="3" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.5" class="component-pulse"/>
            <!-- Label -->
            <text x="19" y="245" font-size="7" fill="#C9A96E" text-anchor="middle" opacity="0.7">Audio</text>
          </g>
        </g>

        <!-- RIGHT TEMPLE -->
        <g id="right-temple">
          <!-- Temple arm -->
          <path d="M 700 190 L 750 190 Q 770 190 780 195 L 785 210" 
                stroke="url(#frameGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
          <!-- Hinge -->
          <circle cx="700" cy="190" r="6" fill="#2C5F7C" stroke="#4A9BB8" stroke-width="1.5"/>
          
          <!-- BONE CONDUCTION SPEAKER - RIGHT -->
          <g id="right-speaker">
            <!-- Speaker housing -->
            <rect x="772" y="200" width="18" height="30" rx="9" 
                  fill="url(#speakerGrad)" stroke="#C9A96E" stroke-width="1.5"/>
            <!-- Speaker grille lines -->
            <line x1="776" y1="208" x2="786" y2="208" stroke="#A88850" stroke-width="1" opacity="0.7"/>
            <line x1="776" y1="213" x2="786" y2="213" stroke="#A88850" stroke-width="1" opacity="0.7"/>
            <line x1="776" y1="218" x2="786" y2="218" stroke="#A88850" stroke-width="1" opacity="0.7"/>
            <line x1="776" y1="223" x2="786" y2="223" stroke="#A88850" stroke-width="1" opacity="0.7"/>
            <!-- Vibration indicator -->
            <circle cx="781" cy="215" r="3" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.5" class="component-pulse"/>
            <!-- Label -->
            <text x="781" y="245" font-size="7" fill="#C9A96E" text-anchor="middle" opacity="0.7">Audio</text>
          </g>
        </g>

        <!-- Component Legend -->
        <g id="legend" transform="translate(250, 310)">
          <text x="0" y="0" font-size="11" fill="#E8E2D8" font-weight="500">Components:</text>
          <circle cx="10" cy="15" r="3" fill="#4A9BB8"/>
          <text x="20" y="18" font-size="9" fill="rgba(232,226,216,0.7)">Time-of-Flight Cameras</text>
          <circle cx="10" cy="30" r="3" fill="#C9A96E"/>
          <text x="20" y="33" font-size="9" fill="rgba(232,226,216,0.7)">Bone Conduction Speakers</text>
          <circle cx="180" cy="15" r="3" fill="#C9A96E"/>
          <text x="190" y="18" font-size="9" fill="rgba(232,226,216,0.7)">GPS + IMU Sensor</text>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
